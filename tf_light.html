<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>標準三燈式十字路口模擬器</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1d; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        .controls { background: #252529; padding: 20px; border-radius: 15px; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .control-group { margin-bottom: 20px; border-bottom: 1px solid #3d3d42; padding-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #00d2ff; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d2ff; }
        .val { float: right; color: #ffa502; font-weight: bold; font-family: monospace; }
        canvas { background: #2c3e50; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { margin-bottom: 10px; color: #00d2ff; text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        .status { font-family: 'Courier New', Courier, monospace; background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid #00d2ff; }
    </style>
</head>
<body>

    <h1>🚦 標準三燈式模擬系統</h1>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>南北向綠燈: <span class="val" id="nsG_v">8</span>s</label>
                <input type="range" id="nsG" min="3" max="30" value="8">
                <label>南北向黃燈: <span class="val" id="nsY_v">3</span>s</label>
                <input type="range" id="nsY" min="1" max="5" value="3">
            </div>
            <div class="control-group">
                <label>東西向綠燈: <span class="val" id="ewG_v">8</span>s</label>
                <input type="range" id="ewG" min="3" max="30" value="8">
                <label>東西向黃燈: <span class="val" id="ewY_v">3</span>s</label>
                <input type="range" id="ewY" min="1" max="5" value="3">
            </div>
            <div class="status">
                <b>STATE:</b> <span id="curState" style="color:#2ed573">NS_PASS</span><br>
                <b>TIMER:</b> <span id="curTimer">0.0</span>s
            </div>
        </div>

        <canvas id="roadCanvas" width="600" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('roadCanvas');
        const ctx = canvas.getContext('2d');

        const NS_GO=0, NS_WAIT=1, EW_GO=2, EW_WAIT=3;
        let state = NS_GO;
        let timer = 0;
        let cars = [];

        const inputs = {
            nsG: document.getElementById('nsG'), nsY: document.getElementById('nsY'),
            ewG: document.getElementById('ewG'), ewY: document.getElementById('ewY')
        };

        function updateUI() {
            document.getElementById('nsG_v').textContent = inputs.nsG.value;
            document.getElementById('nsY_v').textContent = inputs.nsY.value;
            document.getElementById('ewG_v').textContent = inputs.ewG.value;
            document.getElementById('ewY_v').textContent = inputs.ewY.value;
        }
        Object.values(inputs).forEach(i => i.oninput = updateUI);

        class Car {
            constructor(dir) {
                this.dir = dir; // 0:北往南, 1:南往北, 2:西往東, 3:東往西
                this.w = 34; this.h = 18;
                this.speed = 0;
                this.maxS = 1.8 + Math.random() * 1.2;
                this.color = `hsl(${Math.random()*360}, 60%, 55%)`;
                if(dir==0) { this.x = 270; this.y = -40; this.vx = 0; this.vy = 1; }
                if(dir==1) { this.x = 330; this.y = 640; this.vx = 0; this.vy = -1; }
                if(dir==2) { this.x = -40; this.y = 330; this.vx = 1; this.vy = 0; }
                if(dir==3) { this.x = 640; this.y = 270; this.vx = -1; this.vy = 0; }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.save();
                ctx.translate(this.x, this.y);
                if(this.dir >= 2) ctx.rotate(0); else ctx.rotate(Math.PI/2);
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(this.w/5, -this.h/2, 5, this.h); // 擋風玻璃
                ctx.restore();
            }
        }

        // 繪製標準三燈座
        function drawTrafficSignal(x, y, orientation, activeColor) {
            const boxW = (orientation === 'V') ? 24 : 64;
            const boxH = (orientation === 'V') ? 64 : 24;
            
            // 燈箱外殼
            ctx.fillStyle = "#111";
            ctx.shadowBlur = 0;
            ctx.fillRect(x - boxW/2, y - boxH/2, boxW, boxH);

            // 三個燈的位置
            const colors = ['red', 'yellow', 'green'];
            const hex = { red: "#ff4757", yellow: "#ffa502", green: "#2ed573", off: "#222" };
            
            colors.forEach((c, i) => {
                let lx = x, ly = y;
                if(orientation === 'V') ly = y - 20 + (i * 20); // 垂直: 紅上、黃中、綠下
                else lx = x - 20 + (i * 20); // 水平: 紅左、黃中、綠右
                
                const isLit = (c === activeColor);
                ctx.fillStyle = isLit ? hex[c] : hex.off;
                
                // 燈光發光效果
                if(isLit) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = hex[c];
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.beginPath();
                ctx.arc(lx, ly, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; // 重設發光
            });
        }

        function loop() {
            let limits = [inputs.nsG.value, inputs.nsY.value, inputs.ewG.value, inputs.ewY.value];
            timer += 0.016;
            if(timer >= limits[state]) { timer = 0; state = (state + 1) % 4; }

            document.getElementById('curTimer').textContent = timer.toFixed(1);
            document.getElementById('curState').textContent = ["NS_GO", "NS_YEL", "EW_GO", "EW_YEL"][state];

            // 背景繪製
            ctx.fillStyle = "#34495e"; ctx.fillRect(0,0,600,600);
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(240, 0, 120, 600); ctx.fillRect(0, 240, 600, 120);
            
            // 生成車輛
            if(Math.random() < 0.03) cars.push(new Car(Math.floor(Math.random()*4)));

            // 更新車輛
            for(let i=cars.length-1; i>=0; i--){
                let c = cars[i];
                let stop = false;
                let dC = (c.dir==0)?240-c.y : (c.dir==1)?c.y-360 : (c.dir==2)?240-c.x : c.x-360;

                if(dC > 0 && dC < 60) {
                    if(c.dir <= 1 && state >= 2) stop = true;
                    if(c.dir <= 1 && state == 1) stop = true; 
                    if(c.dir >= 2 && (state == 0 || state == 1)) stop = true;
                    if(c.dir >= 2 && state == 3) stop = true;
                }
                
                // 跟車
                cars.forEach(o => {
                    if(o===c || o.dir!==c.dir) return;
                    let d = (c.dir==0)?o.y-c.y : (c.dir==1)?c.y-o.y : (c.dir==2)?o.x-c.x : c.x-o.x;
                    if(d > 0 && d < 45) stop = true;
                });

                c.speed = stop ? Math.max(0, c.speed-0.15) : Math.min(c.maxS, c.speed+0.08);
                c.x += c.vx * c.speed; c.y += c.vy * c.speed;
                c.draw();
                if(c.x < -50 || c.x > 650 || c.y < -50 || c.y > 650) cars.splice(i, 1);
            }

            // 繪製三燈式紅綠燈
            let nsColor = (state==0)?"green":(state==1)?"yellow":"red";
            let ewColor = (state==2)?"green":(state==3)?"yellow":"red";

            drawTrafficSignal(210, 200, 'V', nsColor); // 北
            drawTrafficSignal(390, 400, 'V', nsColor); // 南
            drawTrafficSignal(200, 390, 'H', ewColor); // 西
            drawTrafficSignal(400, 210, 'H', ewColor); // 東

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
